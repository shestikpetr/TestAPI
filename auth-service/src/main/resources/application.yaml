spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  docker:
    compose:
      enabled: false

server:
  port: 8081
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    path: /docs

jwt:
  secret: ${JWT_SECRET:your-secret-key-min-32-chars-long}
  expiration: 86400000